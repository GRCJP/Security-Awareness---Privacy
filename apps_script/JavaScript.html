<script>
(function() {
  'use strict';

  const MODULES = [
    { name: 'Foundations',    range: [1, 6] },
    { name: 'Handling',       range: [7, 13] },
    { name: 'In Practice',    range: [14, 18] },
    { name: 'Consequences',   range: [19, 23] },
    { name: 'Acknowledgment', range: [24, 26] }
  ];

  const state = {
    currentStep: 0,
    totalSteps: 0,
    navigableSteps: 0,
    stepTimestamps: [],
    startTime: new Date(),
    submitted: false
  };

  document.addEventListener('DOMContentLoaded', function() {
    const steps = document.querySelectorAll('.step');
    state.totalSteps = steps.length;
    state.navigableSteps = state.totalSteps - 2;

    showStep(0);
    state.stepTimestamps.push({ step: 0, time: new Date().toISOString() });

    document.querySelectorAll('[data-action="next"]').forEach(function(btn) { btn.addEventListener('click', handleNext); });
    document.querySelectorAll('[data-action="prev"]').forEach(function(btn) { btn.addEventListener('click', handlePrev); });

    // SVG fallback shows by default; only hide it when the photo actually loads.
    document.querySelectorAll('.hero-photo').forEach(function(hero) {
      var bgImage = hero.style.backgroundImage;
      var match = bgImage.match(/url\(['"]?([^'")]+)['"]?\)/);
      if (!match) return; // no photo URL — keep SVG showing
      var url = match[1];
      var img = new Image();
      img.onload = function() {
        hero.classList.add('photo-loaded');
      };
      img.onerror = function() {
        hero.style.backgroundImage = 'none';
      };
      img.src = url;
    });

    document.querySelectorAll('.scenario-reveal-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const card = btn.closest('.scenario-card');
        const answer = card.querySelector('.scenario-answer');
        if (answer) {
          answer.classList.add('show');
          btn.style.display = 'none';
        }
      });
    });

    const submitBtn = document.getElementById('submit-btn');
    if (submitBtn) submitBtn.addEventListener('click', handleSubmit);

    const prsCheckbox = document.getElementById('prs-acknowledged');
    if (prsCheckbox) {
      prsCheckbox.addEventListener('change', function() {
        const box = prsCheckbox.closest('.prs-checkbox');
        if (prsCheckbox.checked) box.classList.add('checked');
        else box.classList.remove('checked');
      });
    }

    document.querySelectorAll('input, select').forEach(function(field) {
      field.addEventListener('input', function() {
        field.classList.remove('invalid');
        const errEl = document.getElementById(field.id + '-error');
        if (errEl) errEl.classList.remove('show');
      });
    });

    window.addEventListener('beforeunload', function(e) {
      if (state.currentStep > 0 && !state.submitted) {
        e.preventDefault();
        e.returnValue = '';
        return '';
      }
    });
  });

  function showStep(index) {
    const steps = document.querySelectorAll('.step');
    steps.forEach(function(s, i) { s.classList.toggle('active', i === index); });
    state.currentStep = index;
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });

    const activeStep = steps[index];
    if (activeStep) {
      const heading = activeStep.querySelector('h2');
      if (heading) {
        heading.setAttribute('tabindex', '-1');
        setTimeout(function() { heading.focus(); }, 100);
      }
    }
  }

  function updateProgress() {
    const fill = document.getElementById('progress-fill');
    const stepName = document.getElementById('progress-step-name');
    const stepPct = document.getElementById('progress-step-pct');

    let pct;
    if (state.submitted) {
      pct = 100;
    } else {
      const lastNavigableIndex = state.navigableSteps - 1;
      if (state.currentStep >= lastNavigableIndex) {
        pct = 100;
      } else {
        pct = Math.round((state.currentStep / lastNavigableIndex) * 100);
      }
    }

    if (fill) fill.style.width = pct + '%';
    if (stepPct) stepPct.textContent = pct + '%';

    const activeStep = document.querySelectorAll('.step')[state.currentStep];
    if (activeStep && stepName) stepName.textContent = activeStep.dataset.stepName || '';

    updateModuleIndicator();
  }

  function updateModuleIndicator() {
    const moduleEls = document.querySelectorAll('.progress-module');
    if (!moduleEls.length) return;
    moduleEls.forEach(function(el, i) {
      el.classList.remove('active', 'complete');
      const mod = MODULES[i];
      if (!mod) return;
      const start = mod.range[0];
      const end = mod.range[1];
      if (state.currentStep > end) el.classList.add('complete');
      else if (state.currentStep >= start) el.classList.add('active');
    });
  }

  function handleNext() {
    if (!validateCurrentStep()) return;
    if (state.currentStep < state.totalSteps - 1) {
      const nextIndex = state.currentStep + 1;
      state.stepTimestamps.push({ step: nextIndex, time: new Date().toISOString() });
      showStep(nextIndex);
    }
  }

  function handlePrev() {
    if (state.currentStep > 0) showStep(state.currentStep - 1);
  }

  function validateCurrentStep() {
    const steps = document.querySelectorAll('.step');
    const currentStep = steps[state.currentStep];
    if (!currentStep) return true;

    let valid = true;
    let firstInvalid = null;

    const requiredFields = currentStep.querySelectorAll('[data-required="true"]');
    requiredFields.forEach(function(field) {
      if (!fieldHasValue(field)) {
        showFieldError(field, 'This field is required.');
        valid = false;
        if (!firstInvalid) firstInvalid = field;
      } else if (field.dataset.validate === 'email-domain') {
        const v = field.value.trim().toLowerCase();
        if (!v.includes('@') || v.indexOf('@') === v.length - 1) {
          showFieldError(field, 'Please enter a valid email address.');
          valid = false;
          if (!firstInvalid) firstInvalid = field;
        }
      }
    });

    const requiredAcks = currentStep.querySelectorAll('[data-ack-required="true"]');
    requiredAcks.forEach(function(cb) {
      if (!cb.checked) {
        const box = cb.closest('.prs-checkbox');
        if (box) {
          box.style.borderColor = 'var(--alert)';
          setTimeout(function() { box.style.borderColor = ''; }, 2500);
        }
        const errEl = document.getElementById(cb.id + '-error');
        if (errEl) errEl.classList.add('show');
        valid = false;
        if (!firstInvalid) firstInvalid = cb;
      }
    });

    if (!valid && firstInvalid) firstInvalid.focus();
    return valid;
  }

  function fieldHasValue(field) {
    if (field.tagName === 'SELECT') return !!field.value;
    return field.value && field.value.trim().length > 0;
  }

  function showFieldError(field, msg) {
    field.classList.add('invalid');
    const errEl = document.getElementById(field.id + '-error');
    if (errEl) {
      errEl.textContent = msg;
      errEl.classList.add('show');
    }
  }

  function handleSubmit() {
    if (!validateCurrentStep()) return;
    const payload = {
      firstName: getValue('firstName'),
      lastName: getValue('lastName'),
      role: getValue('role'),
      sensitiveDataAccess: getValue('sensitiveDataAccess'),
      ftiAccess: getValue('ftiAccess'),
      supervisorEmail: getValue('supervisorEmail'),
      qualityRating: getValue('qualityRating'),
      signature: getValue('signature'),
      prsAcknowledged: document.getElementById('prs-acknowledged').checked,
      stepTimestamps: state.stepTimestamps,
      durationSeconds: Math.round((new Date() - state.startTime) / 1000)
    };
    setSubmittingState(true);
    google.script.run
      .withSuccessHandler(onSubmitSuccess)
      .withFailureHandler(onSubmitFailure)
      .submitTraining(payload);
  }

  function setSubmittingState(isSubmitting) {
    document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
    if (isSubmitting) {
      const submittingEl = document.getElementById('submitting-state');
      if (submittingEl) submittingEl.classList.add('active');
    }
  }

  function onSubmitSuccess(result) {
    state.submitted = true;
    if (!result || !result.success) {
      onSubmitFailure(new Error((result && result.error) || 'Submission failed'));
      return;
    }
    document.getElementById('submitting-state').classList.remove('active');
    const dateEl = document.getElementById('success-completion-date');
    const dueEl = document.getElementById('success-next-due');
    const emailEl = document.getElementById('success-email');
    const certIdEl = document.getElementById('success-cert-id');
    const certLinkEl = document.getElementById('success-cert-link');
    if (dateEl) dateEl.textContent = result.completionDate || '';
    if (dueEl) dueEl.textContent = result.nextDueDate || '';
    if (emailEl) emailEl.textContent = result.userEmail || '';
    if (certIdEl) certIdEl.textContent = result.certificateId || '';
    if (certLinkEl && result.certificateUrl) {
      certLinkEl.href = result.certificateUrl;
      certLinkEl.style.display = 'inline-block';
    }
    document.getElementById('success-state').classList.add('active');
    const fill = document.getElementById('progress-fill');
    if (fill) fill.style.width = '100%';
    const stepPct = document.getElementById('progress-step-pct');
    if (stepPct) stepPct.textContent = '100%';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function onSubmitFailure(err) {
    document.getElementById('submitting-state').classList.remove('active');
    showStep(state.totalSteps - 3);
    const errMsg = (err && err.message) || 'An unexpected error occurred. Please contact your information security office.';
    const banner = document.getElementById('submit-error');
    if (banner) {
      banner.textContent = errMsg;
      banner.style.display = 'block';
    }
    const submitBtn = document.getElementById('submit-btn');
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit & Generate Certificate';
    }
  }

  function getValue(id) {
    const el = document.getElementById(id);
    if (!el) return '';
    return (el.value || '').trim();
  }
})();
</script>
