<style>
:root {
  --navy:        #1F2630;
  --slate:       #3D4A5B;
  --cream:       #F5F0EA;
  --cream-deep:  #EDE5D8;
  --tan:         #C9966B;
  --tan-dark:    #A87A52;
  --tan-light:   #E5C7A3;
  --beige:       #E8E1D1;
  --gray:        #81807C;
  --gray-light:  #C9C8C5;
  --success:     #4A7C59;
  --success-bg:  #EDF3EE;
  --alert:       #A94442;
  --alert-bg:    #FBF1EE;
  --info:        #4A6B8A;
  --info-bg:     #EDF1F5;
  --md-red:      #E03A3E;
  --md-yellow:   #FFD200;
  --white:       #FFFFFF;
  --shadow-sm: 0 1px 2px rgba(31, 38, 48, 0.08);
  --shadow-md: 0 4px 12px rgba(31, 38, 48, 0.12);
  --shadow-lg: 0 12px 32px rgba(31, 38, 48, 0.18);
  --radius: 6px;
  --radius-lg: 12px;
  --radius-xl: 20px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 18px;
  line-height: 1.65;
  color: var(--navy);
  background-color: var(--cream);
  min-height: 100vh;
}

.app-container { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

/* HEADER */
.app-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--slate) 100%);
  color: var(--cream);
  padding: 32px 28px;
  border-bottom: 6px solid var(--tan);
}
.app-header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
.app-header-brand { display: flex; align-items: center; gap: 22px; }
.app-header-logo { height: 44px; width: auto; display: block; flex-shrink: 0; }
.app-header-text { display: flex; flex-direction: column; }
.app-header .agency-tag { font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--tan-light); margin-bottom: 6px; font-weight: 700; }
.app-header h1 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: 0.01em; line-height: 1.3; color: var(--cream); }

/* PROGRESS / MODULE INDICATOR */
.progress-container {
  background-color: var(--white);
  padding: 18px 28px;
  border-bottom: 1px solid var(--beige);
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: var(--shadow-sm);
}
.progress-inner { max-width: 1100px; margin: 0 auto; }
.progress-modules { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.progress-module {
  flex: 1;
  min-width: 90px;
  text-align: center;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background-color: var(--beige);
  color: var(--gray);
  transition: all 0.4s var(--ease);
}
.progress-module.active {
  background-color: var(--tan);
  color: var(--white);
  animation: pulse-active 0.5s var(--ease);
}
.progress-module.complete { background-color: var(--success); color: var(--white); }
.progress-module.complete::before { content: '✓ '; font-weight: 700; }
@keyframes pulse-active {
  0% { transform: scale(1); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}
.progress-label { display: flex; justify-content: space-between; align-items: center; font-size: 15px; color: var(--gray); }
.progress-label .step-name { font-weight: 700; color: var(--navy); font-size: 16px; }
.progress-label .step-pct { font-weight: 700; color: var(--tan-dark); font-variant-numeric: tabular-nums; font-size: 16px; }

/* CARDS */
.card {
  background-color: var(--white);
  margin-top: 32px;
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.card-body { padding: 56px 64px; }

/* HERO BLOCKS - solid color treatments */
.hero-block {
  padding: 64px 64px 56px;
  position: relative;
  overflow: hidden;
}
.hero-block.navy { background: linear-gradient(135deg, var(--navy) 0%, var(--slate) 100%); }
.hero-block.tan { background: linear-gradient(135deg, var(--tan-dark) 0%, var(--tan) 100%); }
.hero-block.cream {
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-deep) 100%);
  border-bottom: 4px solid var(--tan);
}
.hero-block::before {
  content: '';
  position: absolute;
  top: -120px;
  right: -120px;
  width: 320px;
  height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201, 150, 107, 0.25) 0%, transparent 70%);
  pointer-events: none;
  animation: drift 20s ease-in-out infinite alternate;
}
.hero-block.cream::before { background: radial-gradient(circle, rgba(201, 150, 107, 0.18) 0%, transparent 70%); }
@keyframes drift {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-30px, 20px); }
}

/* HERO PHOTO - real photo with SVG fallback layer */
.hero-photo {
  padding: 88px 64px 60px;
  position: relative;
  overflow: hidden;
  min-height: 340px;
  display: flex;
  align-items: flex-end;
  background-color: var(--navy);
  background: linear-gradient(135deg, var(--navy) 0%, var(--slate) 100%);
  background-size: cover;
  background-position: center;
}
.hero-photo .hero-svg-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
  display: block;
}
.hero-photo.photo-loaded .hero-svg-bg { display: none; }
.hero-photo .hero-svg-bg svg {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60%;
  display: block;
  opacity: 0.85;
}
.hero-photo .hero-photo-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(180deg, rgba(31, 38, 48, 0.4) 0%, rgba(31, 38, 48, 0.88) 100%);
  pointer-events: none;
}
.hero-photo.welcome .hero-photo-overlay {
  background: linear-gradient(95deg, rgba(31, 38, 48, 0.92) 0%, rgba(31, 38, 48, 0.78) 35%, rgba(31, 38, 48, 0.35) 65%, rgba(31, 38, 48, 0.45) 100%);
}
.hero-photo .hero-block-content { position: relative; z-index: 2; }
.hero-photo.welcome .hero-block-content { max-width: 580px; }

.hero-block-content { position: relative; z-index: 1; max-width: 760px; }

/* Hero eyebrow */
.hero-block .section-eyebrow,
.hero-photo .section-eyebrow {
  font-size: 15px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 16px;
}
.hero-block.navy .section-eyebrow,
.hero-photo .section-eyebrow { color: var(--tan-light) !important; }
.hero-block.tan .section-eyebrow { color: #FFFFFF !important; }
.hero-block.cream .section-eyebrow { color: var(--tan-dark) !important; }

/* Hero h2 */
.hero-block h2,
.hero-photo h2 {
  margin: 0;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.hero-block.navy h2,
.hero-block.tan h2,
.hero-photo h2 { color: #FFFFFF !important; }
.hero-block.cream h2 { color: var(--navy) !important; }

/* Hero subtitle */
.hero-subtitle {
  margin: 20px 0 0;
  font-size: 23px;
  line-height: 1.55;
  font-weight: 400;
}
.hero-block.navy .hero-subtitle,
.hero-block.tan .hero-subtitle,
.hero-photo .hero-subtitle { color: #FFFFFF !important; opacity: 0.96; }
.hero-block.cream .hero-subtitle { color: var(--slate) !important; opacity: 1; }

/* MODULE INTRO */
.module-intro {
  padding: 80px 64px;
  text-align: center;
  background: linear-gradient(135deg, var(--navy) 0%, var(--slate) 100%);
  color: #FFFFFF;
  position: relative;
  overflow: hidden;
}
.module-intro::before {
  content: '';
  position: absolute;
  top: -120px;
  right: -120px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, var(--tan) 0%, transparent 70%);
  opacity: 0.25;
  animation: drift 24s ease-in-out infinite alternate;
}
.module-intro-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
.module-intro .module-number {
  display: inline-block;
  font-size: 13px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--tan-light);
  font-weight: 700;
  margin-bottom: 18px;
  padding: 8px 22px;
  background-color: rgba(255,255,255,0.1);
  border-radius: 20px;
}

/* Scenario hook */
.scenario-hook {
  background-color: rgba(255, 255, 255, 0.06);
  border-left: 3px solid var(--tan);
  padding: 22px 28px;
  margin: 24px 0 28px;
  text-align: left;
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
}
.scenario-hook-label {
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--tan-light);
  font-weight: 700;
  margin-bottom: 10px;
}
.scenario-hook-text {
  margin: 0;
  font-size: 17px;
  line-height: 1.6;
  color: #FFFFFF !important;
  opacity: 0.96;
}
.scenario-hook-text em { font-style: italic; opacity: 0.92; }

.module-intro h2 {
  margin: 0 0 18px;
  font-size: 50px;
  font-weight: 700;
  color: #FFFFFF !important;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.module-intro .module-subtitle {
  font-size: 22px;
  color: #FFFFFF !important;
  opacity: 0.96;
  margin-bottom: 36px;
  line-height: 1.55;
}
.module-sections-list {
  background-color: rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 28px 36px;
  margin: 28px 0 36px;
  text-align: left;
}
.module-sections-list h4 {
  margin: 0 0 14px;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--tan-light);
}
.module-sections-list ul { margin: 0; padding-left: 22px; }
.module-sections-list li {
  color: #FFFFFF;
  opacity: 0.94;
  margin-bottom: 10px;
  font-size: 17px;
}
.module-intro-buttons {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

/* FEATURE SPREAD */
.feature-spread {
  background: linear-gradient(135deg, var(--navy) 0%, var(--slate) 100%);
  color: #FFFFFF;
  padding: 80px 56px;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.feature-spread::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, var(--tan) 0%, transparent 70%);
  opacity: 0.22;
}
.feature-spread-content { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
.feature-spread-eyebrow {
  font-size: 13px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--tan-light);
  font-weight: 700;
  margin-bottom: 32px;
}
.feature-spread-quote {
  font-size: 36px;
  line-height: 1.4;
  color: #FFFFFF !important;
  opacity: 0.96;
  margin: 0 0 32px;
  font-weight: 400;
  font-family: Georgia, "Times New Roman", serif;
  font-style: italic;
}
.feature-spread-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 28px;
  margin-top: 40px;
  padding-top: 32px;
  border-top: 1px solid rgba(255, 255, 255, 0.15);
}
.feature-spread-stat-number {
  font-size: 44px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}
.feature-spread-stat-label {
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--tan-light);
  opacity: 0.95;
}

/* CARD HEADINGS */
.card h2 {
  margin: 0 0 14px;
  font-size: 38px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.card .section-eyebrow {
  font-size: 14px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--tan-dark);
  margin-bottom: 10px;
  font-weight: 700;
}
.card h3 { margin: 36px 0 18px; font-size: 26px; font-weight: 700; color: var(--navy); line-height: 1.3; }
.card p { margin: 0 0 20px; color: var(--navy); font-size: 18px; }
.card .lead {
  font-size: 23px;
  line-height: 1.55;
  color: var(--slate);
  margin-bottom: 32px;
  font-weight: 400;
}
.card .body-text { font-size: 18px; line-height: 1.7; color: var(--navy); margin-bottom: 20px; }

/* CONCEPT BLOCK - text + illustration alternating sides */
.concept-block {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 36px;
  align-items: center;
  margin: 36px 0;
  padding-bottom: 36px;
  border-bottom: 1px solid var(--beige);
}
.concept-block.reverse { grid-template-columns: 1fr 1.4fr; }
.concept-block.reverse .concept-block-text { order: 2; }
.concept-block.reverse .concept-block-art { order: 1; }
.concept-block.no-divider { border-bottom: none; padding-bottom: 0; }
.concept-block-text {
  font-size: 17px;
  line-height: 1.7;
  color: var(--navy);
}
.concept-block-text > *:first-child { margin-top: 0; }
.concept-block-text > *:last-child { margin-bottom: 0; }
.concept-block-text strong { color: var(--navy); font-weight: 700; }
.concept-block-art {
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-deep) 100%);
  border-radius: var(--radius-lg);
  border: 1px solid var(--tan-light);
  aspect-ratio: 5 / 4;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
}
.concept-block-art svg { max-width: 100%; max-height: 100%; }

/* CREAM CALLOUT BLOCK - illustration + text in cream container */
.cream-block {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 32px;
  align-items: center;
  padding: 32px 36px;
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-deep) 100%);
  border-radius: var(--radius-lg);
  margin: 32px 0;
  border-left: 5px solid var(--tan);
}
.cream-block.reverse { grid-template-columns: 1fr 200px; border-left: none; border-right: 5px solid var(--tan); }
.cream-block.reverse .cream-block-text { order: 1; }
.cream-block.reverse .cream-block-art { order: 2; }
.cream-block-art {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}
.cream-block-art svg { max-width: 180px; max-height: 150px; }
.cream-block-text {
  font-size: 17px;
  line-height: 1.65;
  color: var(--navy);
}
.cream-block-text > *:first-child { margin-top: 0; }
.cream-block-text > *:last-child { margin-bottom: 0; }
.cream-block-eyebrow {
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--tan-dark);
  font-weight: 700;
  margin-bottom: 10px;
}

/* CALLOUTS */
.callout {
  background-color: var(--cream);
  border-left: 6px solid var(--tan);
  padding: 24px 30px;
  margin: 32px 0;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 18px;
}
.callout p { margin: 0; font-size: 18px; }
.callout-warn { background-color: var(--alert-bg); border-left-color: var(--alert); }
.callout-good { background-color: var(--success-bg); border-left-color: var(--success); }
.callout-info { background-color: var(--info-bg); border-left-color: var(--info); }
.callout-strong { font-weight: 600; color: var(--navy); font-size: 19px; }

/* DATA CARDS */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  margin: 32px 0;
}
.data-grid-2 { grid-template-columns: repeat(2, 1fr); }
.data-grid-3 { grid-template-columns: repeat(3, 1fr); }
.data-grid-4 { grid-template-columns: repeat(4, 1fr); }
.data-grid-1 { grid-template-columns: 1fr; }

.data-card {
  background-color: var(--cream);
  padding: 28px;
  border-radius: var(--radius-lg);
  border-top: 4px solid var(--tan);
  position: relative;
  transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
  opacity: 0;
  animation: cardEntry 0.5s var(--ease) forwards;
}
.step.active .data-card:nth-child(1) { animation-delay: 0.05s; }
.step.active .data-card:nth-child(2) { animation-delay: 0.10s; }
.step.active .data-card:nth-child(3) { animation-delay: 0.15s; }
.step.active .data-card:nth-child(4) { animation-delay: 0.20s; }
.step.active .data-card:nth-child(5) { animation-delay: 0.25s; }
.step.active .data-card:nth-child(6) { animation-delay: 0.30s; }
.step.active .data-card:nth-child(7) { animation-delay: 0.35s; }
.step.active .data-card:nth-child(8) { animation-delay: 0.40s; }
@keyframes cardEntry {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.data-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.data-card-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--tan) 0%, var(--tan-dark) 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #FFFFFF;
  margin-bottom: 18px;
  font-size: 24px;
  font-weight: 700;
}
.data-card-label {
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--navy);
  margin-bottom: 10px;
}
.data-card-text { font-size: 17px; color: var(--slate); line-height: 1.6; }
.data-card-numbered .data-card-icon { font-family: Georgia, serif; }
.data-card-alert { border-top-color: var(--alert); }
.data-card-alert .data-card-label { color: var(--alert); }
.data-card-alert .data-card-icon { background: linear-gradient(135deg, var(--alert) 0%, #C45855 100%); }
.data-card.data-card-dark {
  background: linear-gradient(135deg, var(--navy) 0%, var(--slate) 100%);
  border-top: none;
  color: #FFFFFF;
}
.data-card-dark .data-card-icon {
  background-color: rgba(201, 150, 107, 0.25);
  border: 1.5px solid var(--tan);
  color: var(--tan-light);
  font-family: Georgia, serif;
}
.data-card-dark .data-card-label { color: var(--tan-light); }
.data-card-dark .data-card-text { color: #FFFFFF; opacity: 0.92; }

/* PENALTY STAT CARDS - prominent number, no off-center icons */
.penalty-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin: 32px 0;
}
.penalty-card {
  background-color: var(--alert-bg);
  border-top: 5px solid var(--alert);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  text-align: center;
  transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
}
.penalty-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.penalty-stat {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 52px;
  font-weight: 700;
  color: var(--alert);
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.penalty-stat-unit {
  font-size: 28px;
  font-weight: 600;
  margin-left: 4px;
}
.penalty-label {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--alert);
  margin-bottom: 12px;
}
.penalty-text { font-size: 15px; color: var(--slate); line-height: 1.55; }

/* SCENARIO CARDS */
.scenario-card {
  background-color: var(--white);
  border: 2px solid var(--tan);
  border-radius: var(--radius-lg);
  padding: 36px;
  margin: 32px 0;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.25s var(--ease);
}
.scenario-card:hover { box-shadow: var(--shadow-md); }
.scenario-label {
  display: inline-block;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #FFFFFF;
  background-color: var(--tan);
  padding: 8px 18px;
  border-radius: 20px;
  font-weight: 700;
  margin-bottom: 18px;
}
.scenario-setup { font-size: 18px; color: var(--navy); line-height: 1.65; margin-bottom: 18px; }
.scenario-question {
  font-size: 21px;
  font-weight: 600;
  color: var(--navy);
  background-color: var(--cream);
  padding: 22px 26px;
  border-radius: var(--radius);
  margin-bottom: 22px;
}
.scenario-reveal-btn {
  background-color: var(--tan);
  color: #FFFFFF;
  border: none;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 600;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background-color 0.2s var(--ease), transform 0.1s var(--ease), box-shadow 0.2s var(--ease);
  font-family: inherit;
}
.scenario-reveal-btn:hover { background-color: var(--tan-dark); box-shadow: var(--shadow-sm); }
.scenario-reveal-btn:active { transform: translateY(1px); }
